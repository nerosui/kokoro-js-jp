name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: actions/cache@v4
        with:
          path: .cache/openjtalk-assets
          key: openjtalk-assets-${{ hashFiles('scripts/fetch-openjtalk-dic-assets.mjs') }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run --ignore-scripts --cache /tmp/npm-cache
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
