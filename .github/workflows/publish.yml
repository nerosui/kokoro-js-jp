name: Publish package to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: >-
          node -e "const version = require('./package.json').version;
          const expected = 'v' + version;
          if (process.env.RELEASE_TAG !== expected) {
            console.error('Release tag ' + process.env.RELEASE_TAG + ' must equal ' + expected);
            process.exit(1);
          }"

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run --ignore-scripts --cache /tmp/npm-cache
      - run: npm publish --access public
